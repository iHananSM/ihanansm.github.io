---
layout: default
---

<header class="pt-3 mb-3">
  {{ content }}
</header>

<div id="content">

  {% assign posts=site.posts | where:"lang", page.lang %}
  <ul>
  {% for post in posts %}
      <li>
          <a href="{{ post.url }}">{{ post.title }}</a>
      </li>
  {% endfor %}
  </ul>

</div>
